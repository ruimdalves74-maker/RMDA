      @keyframes shake {

        20%, 40%, 60%, 80% { transform: translateX(4px); }
      }
      .animate-shake {
        animation: shake 0.6s ease-in-out;
      }
      @keyframes slide-in {
        from { transform: translateY(1rem); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-in {
        animation: slide-in 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fade-in 0.25s ease-out forwards;
      }

      // Load or Initialize States in local storage
      function initAppState() {
        // Tickets
        const localTickets = localStorage.getItem('escola_tickets');
        if (localTickets) {
          try {
            state.tickets = JSON.parse(localTickets);
          } catch {
            state.tickets = JSON.parse(JSON.stringify(INITIAL_TICKETS));
          }
        } else {
          state.tickets = JSON.parse(JSON.stringify(INITIAL_TICKETS));
          localStorage.setItem('escola_tickets', JSON.stringify(state.tickets));
        }

        // Activity Logs
        const localLogs = localStorage.getItem('escola_logs');
        if (localLogs) {
          try {
            state.activityLogs = JSON.parse(localLogs);
          } catch {
            state.activityLogs = getDefaultLogs();
          }
        } else {
          state.activityLogs = getDefaultLogs();
          localStorage.setItem('escola_logs', JSON.stringify(state.activityLogs));
        }

        // Active Sign-in Session
        const localSession = localStorage.getItem('escola_session');
        if (localSession) {
          try {
            state.session = JSON.parse(localSession);
          } catch {
            state.session = null;
          }
        }
      }

      function syncTicketsState() {
        localStorage.setItem('escola_tickets', JSON.stringify(state.tickets));
      }

      function syncSessionState() {
        if (state.session) {
          localStorage.setItem('escola_session', JSON.stringify(state.session));
        } else {
          localStorage.removeItem('escola_session');
        }
      }

      function addActivityLog(ticketId, ticketTitle, action, userName, userRole) {
        const newLog = {
          id: `log-${Date.now()}`,
          ticketId,
          ticketTitle,
          action,
          user: userName,
          role: userRole,
          timestamp: new Date().toISOString()
        };
        state.activityLogs = [newLog, ...state.activityLogs].slice(0, 20);
        localStorage.setItem('escola_logs', JSON.stringify(state.activityLogs));

        // Trigger UI System Notification (Toast)
        const rolePt = userRole === 'teacher' ? 'Prof.' : userRole === 'student' ? 'Estudante' : 'Suporte';
        const notifMsg = `[${rolePt}] ${userName}: ${action} no caso ${ticketId} ("${ticketTitle}")`;
        
        state.notifications.push({ id: Date.now(), message: notifMsg });
        renderNotifications();
      }

              ${renderHeader()}
              <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col gap-6 overflow-hidden">
                ${renderNewTicketForm()}
              </main>
              ${renderFooter()}
            </div>
          `;
        } else {
          root.innerHTML = `
            <div class="min-h-screen bg-slate-50 font-sans flex flex-col text-slate-800">
              ${renderHeader()}
              <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col gap-6 overflow-hidden">

                    ${renderActivityTimeline()}

                  </div>
                </div>
              </main>
              ${renderFooter()}
            </div>
          `;
        }

        // Render confirm dialog if any

          const m = document.createElement('div');
          m.innerHTML = renderConfirmationModal();
          document.body.appendChild(m.firstElementChild);
        }

        // Hydrate Lucide graphics after DOM writing
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }

      // ==========================================
      // COMPONENT 4: ANALYTICS STATS & BENTO GRID
      // ==========================================
      function renderStatsDashboard() {
        const total = state.tickets.length;
        const pending = state.tickets.filter(t => t.status === 'pending').length;
        const inProgress = state.tickets.filter(t => t.status === 'in_progress').length;
        const resolved = state.tickets.filter(t => t.status === 'resolved').length;
        const highUrgency = state.tickets.filter(t => t.urgency === 'high' && t.status !== 'resolved').length;

        // Statistics computation: Categories
        const catStats = CATEGORIES.map(cat => {
          const count = state.tickets.filter(t => t.category === cat.value).length;
          const pct = total > 0 ? Math.round((count / total) * 100) : 0;
          return { ...cat, count, pct };
        }).sort((a, b) => b.count - a.count);

        // Statistics computation: Schools
        const schoolStats = SCHOOLS.map(sc => {
          const count = state.tickets.filter(t => t.schoolId === sc.id).length;
          const pct = total > 0 ? Math.round((count / total) * 100) : 0;
          return { ...sc, count, pct };
        }).sort((a, b) => b.count - a.count);

        // Statistics computation: Spaces (Top 3 rooms)
        const roomMap = {};
        state.tickets.forEach(t => {
          roomMap[t.location] = (roomMap[t.location] || 0) + 1;
        });
        const topRooms = Object.entries(roomMap)
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 3);

        return `
          <div class="space-y-6">
            <!-- Summary cards -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
              <!-- Item 1: Total -->
              <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-slate-50 text-slate-600 rounded-xl">
                  <i data-lucide="bar-chart-3" class="w-[22px] h-[22px]"></i>
                </div>
                <div>
                  <p class="text-[10px] sm:text-xs font-semibold text-slate-400 uppercase tracking-wider">Total de Casos</p>
                  <h4 class="text-xl sm:text-2xl font-extrabold text-slate-900 mt-0.5">${total}</h4>
                </div>
              </div>

              <!-- Item 2: Pending -->
              <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-amber-50 text-amber-600 rounded-xl">
                  <i data-lucide="clock" class="w-[22px] h-[22px]"></i>
                </div>
                <div>
                  <p class="text-[10px] sm:text-xs font-semibold text-slate-400 uppercase tracking-wider">Pendentes</p>
                  <h4 class="text-xl sm:text-2xl font-extrabold text-slate-900 mt-0.5 flex items-center gap-1.5 flex-wrap">
                    <span>${pending}</span>
                    ${highUrgency > 0 ? `<span class="text-[10px] font-bold text-rose-600 bg-rose-50 px-1.5 py-0.5 rounded-md">${highUrgency} Alta</span>` : ''}
                  </h4>
                </div>
              </div>

              <!-- Item 3: In Progress -->
              <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-indigo-50 text-indigo-600 rounded-xl">
                  <i data-lucide="play" class="w-[22px] h-[22px]"></i>
                </div>
                <div>
                  <p class="text-[10px] sm:text-xs font-semibold text-slate-400 uppercase tracking-wider">A Resolver</p>
                  <h4 class="text-xl sm:text-2xl font-extrabold text-slate-900 mt-0.5">${inProgress}</h4>
                </div>
              </div>

              <!-- Item 4: Resolved -->
              <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-4">
                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl">
                  <i data-lucide="check-circle" class="w-[22px] h-[22px]"></i>
                </div>
                <div>
                  <p class="text-[10px] sm:text-xs font-semibold text-slate-400 uppercase tracking-wider">Resolvidos</p>
                  <h4 class="text-xl sm:text-2xl font-extrabold text-slate-900 mt-0.5 flex items-center gap-1.5">
                    <span>${resolved}</span>
                    ${total > 0 ? `<span class="text-[10px] text-emerald-600 font-bold bg-emerald-50 px-1 rounded">(${Math.round((resolved / total) * 100)}%)</span>` : ''}
                  </h4>
                </div>
              </div>
            </div>

            <!-- Bento grids analysis layout -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <!-- Grid Block 1: Categories -->
              <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <h3 class="text-xs sm:text-sm font-bold text-slate-900 flex items-center justify-between mb-4">
                  <span>Incidências por Tipo</span>
                  <span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Frequência global</span>
                </h3>
                <div class="space-y-3.5">
                  ${catStats.map(stat => {
                    let catColor = '#4f46e5';
                    if (stat.value === 'projector') catColor = '#d97706';
                    else if (stat.value === 'network') catColor = '#10b981';
                    else if (stat.value === 'interactive_board') catColor = '#8b5cf6';
                    else if (stat.value === 'infrastructure') catColor = '#e11d48';
                    else if (stat.value === 'other') catColor = '#475569';

                    return `
                      <div class="space-y-1">
                        <div class="flex justify-between items-center text-xs">
                          <span class="font-semibold text-slate-600">${stat.label}</span>
                          <span class="font-mono font-bold text-slate-900">
                            ${stat.count} ${stat.count === 1 ? 'pedido' : 'pedidos'} (${stat.pct}%)
                          </span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                          <div class="h-2 rounded-full transition-all duration-500" style="width: ${stat.count > 0 ? stat.pct : 2}%; background-color: ${catColor}"></div>
                        </div>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>

              <!-- Grid Block 2: Schools -->
              <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <h3 class="text-xs sm:text-sm font-bold text-slate-900 flex items-center gap-2 mb-4">
                  <i data-lucide="school" class="w-4 h-4 text-indigo-600"></i>
                  <span>Pedidos por Unidade Escolar</span>
                </h3>
                <div class="space-y-3.5">
                  ${schoolStats.map(stat => `
                    <div class="space-y-1">
                      <div class="flex justify-between items-center text-xs">
                        <span class="font-semibold text-slate-600 truncate max-w-[170px]" title="${stat.name}">${stat.shortName}</span>
                        <span class="font-mono font-bold text-slate-900 shrink-0">
                          ${stat.count} ${stat.count === 1 ? 'pedido' : 'pedidos'} (${stat.pct}%)
                        </span>
                      </div>
                      <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div class="h-2 rounded-full bg-indigo-600 transition-all duration-500" style="width: ${stat.count > 0 ? stat.pct : 1}%"></div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- Grid Block 3: Critial Hot Spots -->
              <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between">
                <div>
                  <h3 class="text-xs sm:text-sm font-bold text-slate-900 flex items-center gap-2 mb-4">
                    <i data-lucide="map-pin" class="w-4 h-4 text-rose-500"></i>
                    <span>Espaços Críticos</span>
                  </h3>
                  
                  ${topRooms.length > 0 ? `
                    <div class="space-y-3">
                      ${topRooms.map((room, index) => `
                        <div class="flex items-center justify-between p-2.5 rounded-xl bg-slate-50 border border-slate-100">
                          <div class="flex items-center gap-3">
                            <span class="text-xs font-black min-w-[20px] text-center ${
                              index === 0 ? 'text-rose-600' : index === 1 ? 'text-amber-600' : 'text-slate-500'
                            }">#${index + 1}</span>
                            <span class="text-xs font-semibold text-slate-800">${room.name}</span>
                          </div>
                          <span class="text-[10px] uppercase tracking-wider font-bold bg-slate-200/50 text-slate-700 px-2 py-0.5 rounded-md">
                            ${room.count} ${room.count === 1 ? 'Incidência' : 'Incidências'}
                          </span>
                        </div>
                      `).join('')}
                    </div>
                  ` : `
                    <div class="flex flex-col items-center justify-center py-6 text-center text-slate-400">
                      <i data-lucide="sparkles" class="w-6 h-6 text-slate-300 stroke-[1.5] mb-2"></i>
                      <p class="text-xs font-medium">Sem dados suficientes registados.</p>
                    </div>
                  `}
                </div>

                <div class="mt-4 pt-3 border-t border-slate-100 text-[11px] text-slate-400 leading-normal select-none">
                  ${state.session.role === 'technician' ? `
                    <span class="text-amber-600 font-bold bg-amber-50/70 border border-amber-100 px-2 py-1 rounded block text-center">
                      🛠️ Vista de Diagnóstico Operacional Ativa
                    </span>
                  ` : `
                    <span>Os dados refletem o histórico local recente de pedidos reportados pelas salas.</span>
                  `}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      // ==========================================
      // COMPONENT 6: TICKETS CARDS RENDER GRID
      // ==========================================
      function renderTicketsList() {
        const filtered = state.tickets.filter(t => {
          const text = `${t.id} ${t.title} ${t.description} ${t.location} ${t.reporterName}`.toLowerCase();
          const matchesSearch = text.includes(state.searchQuery.toLowerCase());
          const matchesStatus = state.statusFilter === 'all' || t.status === state.statusFilter;
          const matchesCategory = state.categoryFilter === 'all' || t.category === state.categoryFilter;
          const matchesScope = state.scopeFilter === 'all' || t.reportedBy === state.session.email;
          const matchesSchool = state.schoolFilter === 'all' || t.schoolId === state.schoolFilter;
          
          return matchesSearch && matchesStatus && matchesCategory && matchesScope && matchesSchool;
        });

        // Sorting: high urgency pending/in_progress first, then newest
        const sorted = filtered.sort((a, b) => {
          const aUrgent = a.urgency === 'high' && a.status !== 'resolved';
          const bUrgent = b.urgency === 'high' && b.status !== 'resolved';
          if (aUrgent && !bUrgent) return -1;
          if (!aUrgent && bUrgent) return 1;
          return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        });

        if (sorted.length === 0) {
          return `
            <div class="space-y-3.5">
              <div class="flex items-center justify-between text-xs font-bold text-slate-400 uppercase tracking-widest pl-1 select-none">
                <span>Lista de Chamados (0)</span>
                <span>Ordenado por Urgência</span>
              </div>
              <div class="bg-white rounded-2xl border border-slate-100 p-12 text-center text-slate-400 shadow-sm max-w-sm mx-auto">
                <div class="p-4 bg-slate-50 text-slate-300 w-fit rounded-full mx-auto mb-3">
                  <i data-lucide="help-circle" class="w-9 h-9 stroke-[1.2]"></i>
                </div>
                <h3 class="font-bold text-slate-800 text-xs sm:text-sm">Nenhum chamado corresponde aos filtros</h3>
                <p class="text-xs text-slate-500 mt-1 max-w-xs mx-auto">
                  Tente alterar ou limpar a sua barra de pesquisa ou os filtros de tipo no topo.
                </p>
              </div>
            </div>
          `;
        }

        return `
          <div class="space-y-3.5">
            <div class="flex items-center justify-between text-xs font-bold text-slate-400 uppercase tracking-widest pl-1 select-none">
              <span>Lista de Chamadas (${sorted.length})</span>
              <span>Ordenado por Urgência</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${sorted.map(ticket => renderTicketCardElement(ticket)).join('')}
            </div>
          </div>
        `;
      }

      function renderTicketCardElement(ticket) {
        const catInfo = CATEGORIES.find(cat => cat.value === ticket.category) || {
          label: ticket.category,
          iconName: 'help-circle',
          color: 'text-slate-500',

        let dateStr = ticket.createdAt;

                      <span class="inline-block w-1 h-1 rounded-full bg-slate-300"></span>

                    ticket.status === 'in_progress' ? 'bg-indigo-50 text-indigo-700 border border-indigo-200/60' :
                    'bg-emerald-50 text-emerald-700 border border-emerald-200/60'
                  }">
                    ${ticket.status === 'pending' ? 'Pendente' : ticket.status === 'in_progress' ? 'A Resolver' : 'Resolvido'}
                  </span>

                  <!-- Urgency Badge -->
                  ${ticket.status !== 'resolved' ? `
                    <span id="badge-urgency-${ticket.id}" class="inline-flex items-center gap-0.5 px-2.5 py-0.5 rounded-full text-[11px] font-bold ${

                  <i data-lucide="user" class="w-3.5 h-3.5"></i>
                  <span class="font-medium text-slate-700">${ticket.reporterName}</span>

              <!-- Tech Notes display if added -->
              ${ticket.technicalNotes ? `

              <div class="flex flex-wrap items-center justify-end gap-2 pt-1 border-t border-slate-50/50">
                <!-- User can withdraw pending ticket -->
                ${isOwner && ticket.status === 'pending' ? `
                  <button
                    type="button"
                    onclick="window.handleCancelClick('${ticket.id}')"

                <!-- Technician Claim & Resolve controls -->

                      <button

                    >
                      Cancelar
                    </button>
                    <button
                      type="button"
                      onclick="window.handleResolveConfirm('${ticket.id}')"
                      class="px-2.5 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-[10px] font-bold flex items-center gap-1"
                    >
                      <i data-lucide="check-circle" class="w-3 h-3"></i>
                      Gravar e Resolver
                    </button>
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        `;

      // ==========================================

      function renderActivityTimeline() {

                ${state.activityLogs.map((log, index) => {
                  let timeStr = log.timestamp;
                  try {
                    const date = new Date(log.timestamp);
                    timeStr = date.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

                                      'bg-emerald-950 text-emerald-400 border border-emerald-900/60';

                  return `
                    <li class="relative pb-5">

                        <div>

                        required
                        onchange="window.handleFormSchoolSelect(this.value)"
                        class="block w-full pl-9 pr-8 py-2.5 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 rounded-xl text-slate-900 text-sm font-semibold outline-none transition-all cursor-pointer"
                      >
                        ${SCHOOLS.map(sc => `<option value="${sc.id}" ${state.form.schoolId === sc.id ? 'selected' : ''}>${sc.shortName}</option>`).join('')}
                      </select>
                    </div>
                  </div>

                  <!-- field 2: school room location selector -->
                  <div>
                    <label for="space-select" class="block text-[11px] font-bold text-slate-600 uppercase tracking-wider">2. Local / Sala da Avaria</label>
                    <div class="mt-1.5 relative rounded-lg shadow-sm">
                      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                      </div>
                      <select
                        id="space-select"
                        required
                        onchange="window.handleFormSpaceSelect(this.value)"
                        class="block w-full pl-9 pr-af py-2.5 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 rounded-xl text-slate-900 text-sm font-semibold outline-none transition-all cursor-pointer"
                      >
                        <option value="">-- Escolha uma Sala / Espaço --</option>
                        ${SCHOOL_SPACES.filter(space => {
                          const isBasic = state.form.schoolId !== 'esc-camilo';
                          if (isBasic) {
                            return space.type !== 'lab' || space.id === 'sala-a10';
                          }
                          return true;
                        }).map(space => `
                          <option value="${space.name}" ${state.form.location === space.name ? 'selected' : ''}>
                            ${space.name} (${space.block})
                          </option>
                        `).join('')}
                      </select>
                    </div>
                  </div>

                  <!-- field 3: severity rules -->
                  <div>
                    <label class="block text-[11px] font-bold text-slate-600 uppercase tracking-wider select-none">3. Urgência do Pedido</label>
                    ${isTeacher ? `
                      <div class="mt-1.5 grid grid-cols-2 gap-2">
                        <button
                          type="button"
                          onclick="window.handleFormUrgencySelect('normal')"
                          class="py-[9px] px-3 text-[11px] font-bold rounded-xl border transition-all ${
                            state.form.urgency === 'normal'
                              ? 'bg-slate-100 text-slate-900 border-slate-300 shadow-sm'
                              : 'bg-white text-slate-400 border-slate-200 hover:border-slate-300'
                          }"
                        >Regulada</button>
                        <button
                          type="button"
                          onclick="window.handleFormUrgencySelect('high')"
                          class="py-[9px] px-3 text-[11px] font-bold rounded-xl border transition-all flex items-center justify-center gap-1 ${
                            state.form.urgency === 'high'
                              ? 'bg-rose-50 text-rose-700 border-rose-300 ring-2 ring-rose-200'
                              : 'bg-white text-slate-400 border-slate-200 hover:border-slate-300'
                          }"
                        >
                          <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-rose-500"></i>
                          Urgente
                        </button>
                      </div>
                    ` : `
                      <div class="mt-1.5 py-2.5 px-3 bg-slate-100/70 border border-slate-200/50 rounded-xl text-slate-500 text-[10px] flex items-center gap-1.5 leading-tight select-none">
                        <i data-lucide="alert-circle" class="w-4 h-4 text-slate-400 shrink-0"></i>
                        <span><strong>Urgência Normal</strong> atribuída a alunos. Urgências de aula requerem docente.</span>
                      </div>
                    `}
                  </div>
                </div>

                <!-- Category selection grid -->
                <div>
                  <label class="block text-[11px] font-bold text-slate-600 uppercase tracking-wider mb-2 select-none">4. Tipo de Equipamento / Sistema Afetado</label>
                  <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    ${CATEGORIES.map(category => {
                      const isSel = state.form.category === category.value;
                      return `
                        <button
                          type="button"
                          onclick="window.handleFormCategorySelect('${category.value}')"
                          class="p-3 text-left rounded-xl border flex flex-col justify-between transition-all ${
                            isSel
                              ? 'bg-indigo-50/50 border-indigo-600 text-indigo-950 ring-2 ring-indigo-100'
                              : 'bg-white hover:bg-slate-50 border-slate-200 text-slate-700'
                          }"
                        >
                          <span class="p-1.5 w-fit rounded-lg ${category.bgColor} ${category.color} border ${category.borderColor}">
                            <i data-lucide="${category.iconName}" class="w-4 h-4"></i>
                          </span>
                          <span class="text-xs font-bold mt-2 leading-tight block">
                            ${category.label}
                          </span>
                        </button>
                      `;
                    }).join('')}
                  </div>
                </div>

                <!-- Title main short -->
                <div>
                  <label for="title-input" class="block text-[11px] font-bold text-slate-600 uppercase tracking-wider">5. Erro principal (Título curto)</label>
                  <input
                    id="title-input"
                    required
                    type="text"
                    value="${state.form.title}"
                    oninput="state.form.title = this.value"
                    placeholder="ex: Projetor não sintoniza cabo HDMI"
                    class="mt-1.5 block w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 rounded-xl text-slate-900 text-sm font-semibold outline-none transition-all"
                  />
                </div>

                <!-- Description Main detail -->
                <div>
                  <label for="desc-textarea" class="block text-[11px] font-bold text-slate-600 uppercase tracking-wider">6. Descrição Detalhada / Sintomas</label>
                  <textarea
                    id="desc-textarea"
                    required
                    rows="4"
                    placeholder="Descreva exatamente o que está a acontecer para que os técnicos tragam os componentes certos. Por exemplo: o ecrã fica verde ao mexer na ficha, ou há luz vermelha de erro ativa no projetor do teto..."
                    oninput="state.form.description = this.value"
                    class="mt-1.5 block w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 rounded-xl text-slate-900 text-sm outline-none transition-all font-sans"
                  >${state.form.description}</textarea>
                </div>

                <!-- Form actions buttons -->
                <div class="flex justify-end gap-3 pt-3 border-t border-slate-100 select-none">
                  <button
                    type="button"
                    onclick="window.handleFormCancel()"
                    class="px-4 py-2.5 border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-xl text-xs font-bold transition-all"
                  >Cancelar</button>
                  <button
                    type="submit"
                    id="submit-ticket-btn"
                    class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold transition-all shadow-md hover:shadow-lg flex items-center gap-1.5"
                  >
                    Emitir Pedido de Assistência
                    <i data-lucide="send" class="w-3.5 h-3.5"></i>
                  </button>
                </div>
              </form>
            </div>
          </div>
        `;
      }

      // ==========================================
      // COMPONENT 9: STATIC FOOTER
      // ==========================================
      function renderFooter() {
        return `
          <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 shrink-0 text-center text-xs select-none">
            <div class="max-w-7xl mx-auto px-4">
              <p>© ${new Date().getFullYear()} ${SCHOOL_NAME} — Direção de Sistemas de Informação.</p>
              <p class="text-[10px] text-slate-600 mt-1">Plataforma interna operada em Circuito Fechado de Assistência nas Salas e Espaços.</p>
            </div>
          </footer>
        `;
      }

      // ==========================================
      // COMPONENT 10: ACTION CONFIRMATION MODAL
      // ==========================================
      function renderConfirmationModal() {
        if (!state.confirmAction) return '';
        const isCancel = state.confirmAction.type === 'cancel';
        const modalColorClass = isCancel ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600';
        const buttonColorClass = isCancel 
          ? 'bg-rose-600 hover:bg-rose-700 text-white focus:ring-rose-500' 
          : 'bg-emerald-600 hover:bg-emerald-700 text-white focus:ring-emerald-500';
        
        return `
          <div id="action-confirm-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm animate-fade-in">
            <div 
              role="dialog"
              aria-modal="true"
              class="bg-white rounded-2xl max-w-sm sm:max-w-md w-full border border-slate-100 shadow-2xl overflow-hidden scale-100 transition-transform duration-200" 
              onclick="event.stopPropagation()"
            >
              <div class="p-6 space-y-4">
                <div class="flex items-center gap-3">
                  <div class="p-2.5 rounded-xl shrink-0 ${modalColorClass}">
                    <i data-lucide="${isCancel ? 'trash-2' : 'check-circle'}" class="w-6 h-6"></i>
                  </div>
                  <h4 class="text-sm sm:text-base font-bold text-slate-900">
                    ${state.confirmAction.title}
                  </h4>
                </div>
                
                <p class="text-xs text-slate-500 leading-relaxed">
                  ${state.confirmAction.message}
                </p>

                ${!isCancel ? `
                  <div class="bg-slate-50 border border-slate-200/50 rounded-xl p-3 mt-1 text-left">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Relatório Técnico Registado:</span>
                    <p class="text-xs italic text-slate-600 font-medium">"${state.confirmAction.notes}"</p>
                  </div>
                ` : ''}

                <div class="flex items-center justify-end gap-2.5 pt-2 border-t border-slate-100">
                  <button
                    type="button"
                    onclick="window.handleCloseModal()"
                    class="px-3.5 py-2 border border-slate-200 text-slate-500 hover:bg-slate-50 font-bold rounded-xl text-xs transition-colors"
                  >
                    Voltar
                  </button>
                  <button
                    type="button"
                    onclick="window.executeConfirmedAction()"
                    class="px-3.5 py-2 font-bold rounded-xl text-xs transition-all shadow-sm ${buttonColorClass}"
                  >
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      // ==========================================
      // COMPONENT 11: POP-UP Toast Notifications
      // ==========================================
      function renderNotifications() {
        const container = document.getElementById('notifications-container');
        if (!container) return;

        container.innerHTML = state.notifications.map(n => `
          <div
            id="toast-${n.id}"
            class="bg-slate-900 border-l-4 border-l-indigo-500 text-white p-3.5 rounded-xl shadow-xl text-xs flex items-center justify-between gap-3 animate-slide-in pointer-events-auto"
          >
            <div class="flex items-center gap-3">
              <i data-lucide="bell" class="w-4 h-4 text-indigo-400 shrink-0 animate-bounce"></i>
              <span class="font-medium leading-normal">${n.message}</span>
            </div>
            <button onclick="window.dismissNotification(${n.id})" class="text-slate-400 hover:text-white font-bold px-1 text-[11px]">×</button>
          </div>
        `).join('');

        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      }

      // ==========================================
      // CONTROLLER ACTIONS / EVENT BINDING HANDLERS
      // ==========================================
      
      // Email authentication submission
      window.handleLoginSubmit = function(e) {
        e.preventDefault();
        state.form.errorStatus = '';

        const emailInp = document.getElementById('email-input');
        const nameInp = document.getElementById('name-input');
        
        const emailVal = emailInp?.value?.trim() || '';
        const nameVal = nameInp?.value?.trim() || '';

        if (!emailVal) {
          state.form.errorStatus = 'Por favor, introduza o seu email institucional.';
          render();
          return;
        }

        // Validate basic email layout
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(emailVal)) {
          state.form.errorStatus = 'Introduza um endereço de email válido.';
          render();
          return;
        }

        // Validate domain rules
        const isInst = DEFAULT_DOMAINS.some(domain => emailVal.toLowerCase().endsWith(`@${domain}`)) ||
                     emailVal.toLowerCase().endsWith('.ecarnaxide.pt') ||
                     emailVal.toLowerCase() === 'tecnico@ecarnaxide.pt';

        if (!isInst) {
          state.form.errorStatus = 'Apenas são permitidos emails sob os domínios institucionais (ex: @ecarnaxide.pt ou @aluno.ecarnaxide.pt).';
          render();
          return;
        }

        // Detect Role
        let role = 'teacher';
        const lowerEmail = emailVal.toLowerCase();
        if (lowerEmail.startsWith('tecnico.') || lowerEmail.startsWith('suporte.') || lowerEmail === 'tecnico@ecarnaxide.pt') {
          role = 'technician';
        } else if (lowerEmail.endsWith('@aluno.ecarnaxide.pt')) {
          role = 'student';
        }

        // Generate full visual custom name if empty
        const splitted = emailVal.split('@')[0].split('.');
        const autoName = splitted.map(part => part.charAt(0).toUpperCase() + part.slice(1)).join(' ');
        const finalName = nameVal || autoName;

        state.session = {
          email: emailVal,
          name: finalName,
          role: role,
          domain: emailVal.split('@')[1]
        };

        syncSessionState();
        render();
      };

      // Fast Switch profile login
      window.handleQuickLogin = function(demoEmail, demoName, demoRole) {
        state.form.errorStatus = '';
        state.session = {
          email: demoEmail,
          name: demoName,
          role: demoRole,
          domain: demoEmail.split('@')[1]
        };
        syncSessionState();
        render();
      };

      // Log out
      window.handleLogout = function() {
        state.session = null;
        state.showForm = false;
        syncSessionState();
        render();
      };

      // Profiles quick selector multiplier
      window.handleDemoSwitchRole = function(newRole) {
        if (!state.session) return;
        let pEmail = 'tecnico@ecarnaxide.pt';
        let pName = 'Carlos Mendes (TI)';

        if (newRole === 'student') {
          pEmail = 'tiago.ribeiro@aluno.ecarnaxide.pt';
          pName = 'Tiago Ribeiro (10ºB)';
        } else if (newRole === 'teacher') {
          pEmail = 'margarida.sousa@ecarnaxide.pt';
          pName = 'Prof.ª Margarida Sousa';
        }

        state.session = {
          ...state.session,
          role: newRole,
          name: pName,
          email: pEmail,
          domain: pEmail.split('@')[1]
        };

        syncSessionState();
        render();
      };

      // Toggle text expansion details on click
      window.handleToggleExpanded = function(ticketId) {
        state.expandedTickets[ticketId] = !state.expandedTickets[ticketId];
        render();
      };

      // Set input values dynamically for reports
      window.handleFormSchoolSelect = function(id) {
        state.form.schoolId = id;
        state.form.location = '';
        render();
      };
      
      window.handleFormSpaceSelect = function(spaceName) {
        state.form.location = spaceName;
      };

      window.handleFormUrgencySelect = function(urgency) {
        state.form.urgency = urgency;
        render();
      };

      window.handleFormCategorySelect = function(cat) {
        state.form.category = cat;
        render();
      };

      // Fast templates loader
      window.handleApplyPreset = function(presetId) {
        const p = FAULT_PRESETS.find(item => item.id === presetId);
        if (!p) return;

        state.form.category = p.category;
        state.form.title = p.title;
        state.form.description = p.description;
        
        if (state.session.role === 'teacher') {
          state.form.urgency = p.urgencyDefault;
        } else {
          state.form.urgency = 'normal';
        }
        state.form.errorStatus = '';
        render();
      };

      // Close create tickets form menu
      window.handleFormCancel = function() {
        state.showForm = false;
        state.form.location = '';
        state.form.title = '';
        state.form.description = '';
        state.form.errorStatus = '';
        render();
      };

      window.handleShowForm = function(show) {
        state.showForm = show;
        state.form.schoolId = 'esc-camilo';
        state.form.location = '';
        state.form.category = 'computer';
        state.form.urgency = 'normal';
        state.form.title = '';
        state.form.description = '';
        state.form.errorStatus = '';
        render();
      };

      // Form validation reporting
      window.handleFormSubmit = function(e) {
        e.preventDefault();
        state.form.errorStatus = '';

        if (!state.form.location) {
          state.form.errorStatus = 'Por favor, selecione onde ocorreu a avaria (Sala / Espaço).';
          render();
          return;
        }

        const trimmedTitle = state.form.title.trim();
        if (!trimmedTitle || trimmedTitle.length < 5) {
          state.form.errorStatus = 'O título do problema deve conter pelo menos 5 caracteres.';
          render();
          return;
        }

        const trimmedDesc = state.form.description.trim();
        if (!trimmedDesc || trimmedDesc.length < 10) {
          state.form.errorStatus = 'Por favor, explique o problema em maior detalhe (mínimo 10 caracteres).';
          render();
          return;
        }

        const newId = `TKT-${Math.floor(1000 + Math.random() * 9000)}`;
        const nextTicket = {
          id: newId,
          title: trimmedTitle,
          description: trimmedDesc,
          location: state.form.location,
          schoolId: state.form.schoolId,
          category: state.form.category,
          urgency: state.session.role === 'teacher' ? state.form.urgency : 'normal',
          status: 'pending',
          reportedBy: state.session.email,
          reporterName: state.session.name,
          reportedRole: state.session.role,
          createdAt: new Date().toISOString(),
          updatedAt: null,
          assignedTo: null,
          technicalNotes: null
        };

        state.tickets = [nextTicket, ...state.tickets];
        syncTicketsState();

        // Log actions
        addActivityLog(newId, trimmedTitle, 'reportou nova falha', state.session.name, state.session.role);
        
        state.showForm = false;
        render();
      };

      // Filters changes
      window.handleFilterChange = function(type, value) {
        if (type === 'status') state.statusFilter = value;
        else if (type === 'category') state.categoryFilter = value;
        else if (type === 'scope') state.scopeFilter = value;
        else if (type === 'school') state.schoolFilter = value;
        render();
      };

      window.handleSearchInput = function(val) {
        state.searchQuery = val;
        // Fast render only content region to guard input focus
        const container = document.getElementById('ticket-card-TKT-2490')?.parentElement?.parentElement || document.getElementById('root');
        // Let's do a complete render which is fine since input keeps state. To guard, we don't block
        render();
        // Restore focus on input
        const sInput = document.querySelector('input[placeholder*="Pesquisar por Sala"]');
        if (sInput) {
          sInput.focus();
          // Set selection to end
          sInput.setSelectionRange(val.length, val.length);
        }
      };

      // Claim tickets
      window.handleClaim = function(ticketId) {
        state.tickets = state.tickets.map(t => {
          if (t.id === ticketId) {
            return {
              ...t,
              status: 'in_progress',
              assignedTo: `${state.session.name} (Suporte)`,
              updatedAt: new Date().toISOString()
            };
          }
          return t;
        });
        syncTicketsState();

        const item = state.tickets.find(x => x.id === ticketId);
        if (item) {
          addActivityLog(ticketId, item.title, 'iniciou resolução', state.session.name, state.session.role);
        }
        render();
      };

      // Tech Notes buffer
      window.handleTechNotesInput = function(ticketId, text) {
        state.techNotesForm[ticketId] = text;
      };

      // Setup tech report triggers
      window.handleResolveSubmitTrigger = function(ticketId, show) {
        state.showNotesForm[ticketId] = show;
        if (show) {
          state.techNotesForm[ticketId] = '';
        }
        render();
      };

      // Confirmation modals trigger: RESOLVE
      window.handleResolveConfirm = function(ticketId) {
        const notes = state.techNotesForm[ticketId]?.trim() || 'Problema inspecionado e dado como concluído.';
        const target = state.tickets.find(x => x.id === ticketId);
        if (!target) return;

        state.confirmAction = {
          type: 'resolve',
          ticketId: ticketId,
          title: 'Concluir e Resolver Incidência',
          message: 'Deseja marcar esta incidência como concluída e registar o relatório técnico? O professor/aluno será notificado da resolução.',
          notes: notes
        };
        render();
      };

      // Confirmation modals trigger: CANCEL
      window.handleCancelClick = function(ticketId) {
        state.confirmAction = {
          type: 'cancel',
          ticketId: ticketId,
          title: 'Retirar Pedido de Assistência',
          message: 'Tem a certeza de que deseja retirar este pedido de assistência? Esta ação é irreversível.',
          notes: ''
        };
        render();
      };

      // Cancel modal
      window.handleCloseModal = function() {
        state.confirmAction = null;
        render();
      };

      // Execute modal confirmed actions
      window.executeConfirmedAction = function() {
        if (!state.confirmAction) return;
        const ticketId = state.confirmAction.ticketId;
        const type = state.confirmAction.type;
        const notes = state.confirmAction.notes;

        if (type === 'cancel') {
          const item = state.tickets.find(x => x.id === ticketId);
          state.tickets = state.tickets.filter(x => x.id !== ticketId);
          syncTicketsState();

          if (item) {
            addActivityLog(ticketId, item.title, 'retirou/cancelou o pedido', state.session.name, state.session.role);
          }
        } else if (type === 'resolve') {
          state.tickets = state.tickets.map(t => {
            if (t.id === ticketId) {
              return {
                ...t,
                status: 'resolved',
                technicalNotes: notes,
                updatedAt: new Date().toISOString()
              };
            }
            return t;
          });
          syncTicketsState();

          const item = state.tickets.find(x => x.id === ticketId);
          if (item) {
            addActivityLog(ticketId, item.title, 'marcou como Resolvido', state.session.name, state.session.role);
          }
          state.showNotesForm[ticketId] = false;
        }

        state.confirmAction = null;
        render();
      };

      // Dismiss live toasts
      window.dismissNotification = function(notifId) {
        state.notifications = state.notifications.filter(x => x.id !== notifId);
        renderNotifications();
      };

      // ==========================================
      // APPLICATION STARTUP BOOTSTRAP
      // ==========================================
      window.addEventListener('DOMContentLoaded', () => {
        initAppState();
        render();
      });
    </script>
  </body>
</html>
